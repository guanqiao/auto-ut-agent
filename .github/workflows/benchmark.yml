name: Benchmark

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          pytest tests/benchmarks -v --tb=short

      - name: Run prompt cache benchmark
        run: |
          pytest tests/benchmarks/test_prompt_cache_benchmark.py -v --tb=short

      - name: Comment benchmark results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const benchmarkResults = fs.readFileSync('benchmark_results.txt', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## Benchmark Results\nn' + benchmarkResults
            })
        continue-on-error: true
